backend:
  name: git-gateway
  branch: master
  site_id: 201ab593-6a33-44ff-8bdd-f3187fc17521

publish_mode: editorial_workflow

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "author_profiles"
    label: "👤 Author Profiles"
    description: "Update your team details, profile pictures, and bios here."
    delete: false
    files:
      - name: "team"
        label: "Manage Team & Profiles"
        file: "content/authors.json"
        fields:
          - label: "Authors List"
            name: "authors"
            widget: "list"
            summary: "{{fields.name}} - {{fields.role}}"
            fields:
              - { label: "Unique ID (Slug)", name: "id", widget: "string", hint: "Example: priy-ranjan" }
              - { label: "Full Name (Hindi)", name: "name", widget: "string" }
              - { label: "Role / Designation", name: "role", widget: "string", default: "Content Writer" }
              - { label: "Bio / About", name: "bio", widget: "text" }
              - { label: "Profile Photo", name: "image", widget: "image" }
              - { label: "X (Twitter) Link", name: "x_link", widget: "string", required: false }

  - name: "global_settings"
    label: "⚙️ Global Settings"
    files:
      - name: "navigation"
        label: "🗺️ Navigation Menu"
        file: "content/nav.json"
        fields:
          - label: "Menu Items"
            name: "items"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - { label: "Label (with Emoji)", name: "label", widget: "string" }
              - { label: "Link (e.g. tech.html)", name: "link", widget: "string" }

      - name: "site_config"
        label: "🌐 Site Configuration"
        file: "content/settings.json"
        fields:
          - label: "Payments (UPI/Razorpay)"
            name: "payments"
            widget: "object"
            fields:
              - { label: "UPI ID", name: "upi_id", widget: "string" }
              - { label: "UPI QR Code Image", name: "upi_qr", widget: "image" }
              - { label: "Razorpay / External Link", name: "pay_link", widget: "string" }

  - name: "content"
    label: "📰 News & Content"
    files:
      - name: "articles"
        label: "📝 Articles (Main News)"
        file: "content/articles.json"
        fields:
          - label: "Articles List"
            name: "articles"
            widget: "list"
            summary: "{{fields.title}} [{{fields.category}}]"
            fields:
              - { label: "Title (Hindi)", name: "title", widget: "string" }
              - { label: "URL Slug", name: "slug", widget: "string", hint: "Example: mars-mission-2026" }
              - { label: "Author ID", name: "author_id", widget: "string", default: "priy-ranjan", hint: "Match with Author Profile ID" }
              - { label: "Category", name: "category", widget: "select", options: ["तकनीक", "विज्ञान", "अंतरिक्ष", "पर्यावरण", "स्वास्थ्य"] }
              - { label: "Status", name: "status", widget: "select", options: ["Published", "Draft"], default: "Published" }
              - { label: "Cover Image", name: "image", widget: "image" }
              - { label: "Article Summary", name: "summary", widget: "text" }
              - { label: "Main Body Content", name: "body", widget: "markdown" }
              - { label: "YouTube Video ID", name: "video_id", widget: "string", required: false }
              - { label: "Publish Date", name: "date", widget: "datetime" }

      - name: "ticker"
        label: "📡 Breaking News Ticker"
        file: "content/ticker.json"
        fields:
          - label: "Ticker Headlines"
            name: "items"
            widget: "list"
            fields:
              - { label: "Headline Text", name: "text", widget: "string" }
