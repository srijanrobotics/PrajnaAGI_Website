backend:
  name: git-gateway
  branch: master
  site_id: 201ab593-6a33-44ff-8bdd-f3187fc17521

publish_mode: editorial_workflow

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "https://prajnaagi.com"
display_url: "https://prajnaagi.com"

collections:
  - name: "content"
    label: "📰 News & Content"
    files:
      - name: "articles"
        label: "📝 Articles (Main News)"
        file: "content/articles.json"
        fields:
          - label: "Articles List"
            name: "articles"
            widget: "list"
            summary: "{{fields.title}} [{{fields.category}}]"
            fields:
              - { label: "Title (Hindi)", name: "title", widget: "string" }
              - { label: "URL Slug", name: "slug", widget: "string", hint: "Example: mars-mission-2026" }
              - label: "Author"
                name: "author_id"
                widget: "relation"
                collection: "author_profiles"
                file: "team"
                search_fields: ["authors.*.name", "authors.*.id"]
                value_field: "authors.*.id"
                display_fields: ["authors.*.name"]
              - { label: "Category", name: "category", widget: "select", options: ["तकनीक", "विज्ञान", "अंतरिक्ष", "पर्यावरण", "स्वास्थ्य", "सृजन रोबॉटिक्स"] }
              - { label: "Tag (short, e.g. TECH)", name: "tag", widget: "string", required: false }
              - { label: "Status", name: "status", widget: "select", options: ["Published", "Draft"], default: "Published" }
              - { label: "Cover Image", name: "image", widget: "image" }
              - { label: "Article Summary", name: "summary", widget: "text" }
              - { label: "Body — हिंदी (Hindi)", name: "body_hindi", widget: "markdown", required: true }
              - { label: "Body — अवधी (Awadhi)", name: "body_awadhi", widget: "markdown", required: false }
              - { label: "Body — English", name: "body_english", widget: "markdown", required: false }
              - { label: "YouTube Video ID", name: "video_id", widget: "string", required: false }
              - { label: "Publish Date", name: "date", widget: "datetime" }
              - { label: "Is Tweeted?", name: "tweeted", widget: "boolean", default: false, required: false }
              - { label: "Is Hidden?", name: "hidden", widget: "boolean", default: false, required: false }

      - name: "ticker"
        label: "📡 Breaking News Ticker"
        file: "content/ticker.json"
        fields:
          - label: "Ticker Headlines"
            name: "items"
            widget: "list"
            fields:
              - { label: "Headline Text", name: "text", widget: "string" }

      - name: "facts"
        label: "💡 Facts (क्या आप जानते हैं?)"
        file: "content/facts.json"
        fields:
          - label: "Facts List"
            name: "facts"
            widget: "list"
            summary: "{{fields.highlight}}"
            fields:
              - { label: "Icon (Emoji)", name: "icon", widget: "string" }
              - { label: "Fact Text (Hindi)", name: "fact_text", widget: "text" }
              - { label: "Highlight (bold part)", name: "highlight", widget: "string", required: false }

  - name: "srijan"
    label: "🤖 सृजन रोबॉटिक्स"
    files:
      - name: "progress"
        label: "📈 Robot Progress / Mission Control"
        file: "content/progress.json"
        fields:
          - { label: "Version (e.g. PRAJNA v1.3)", name: "version", widget: "string" }
          - { label: "Overall Progress %", name: "overall", widget: "number", min: 0, max: 100 }
          - { label: "Project Start Date", name: "since", widget: "string", hint: "YYYY-MM-DD" }
          - { label: "Log Count", name: "log", widget: "number" }
          - label: "Systems (HUD strip)"
            name: "systems"
            widget: "list"
            summary: "{{fields.label}}: {{fields.status}}"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Status", name: "status", widget: "select", options: ["ONLINE", "TRAINING", "OFFLINE"] }
          - label: "Milestone Spec Sheets"
            name: "milestones"
            widget: "list"
            summary: "{{fields.stack}} [{{fields.status}}]"
            fields:
              - { label: "Status", name: "status", widget: "select", options: ["COMPLETE", "IN PROGRESS", "PLANNED", "END GOAL"] }
              - { label: "Stack / Tech", name: "stack", widget: "string" }
              - label: "Progress Bars"
                name: "bars"
                widget: "list"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Percent", name: "pct", widget: "number", min: 0, max: 100 }

  - name: "author_profiles"
    label: "👤 Author Profiles"
    description: "Update your team details, profile pictures, and bios here."
    delete: false
    files:
      - name: "team"
        label: "Manage Team & Profiles"
        file: "content/authors.json"
        fields:
          - label: "Authors List"
            name: "authors"
            widget: "list"
            summary: "{{fields.name}} - {{fields.role}}"
            fields:
              - { label: "Unique ID (Slug)", name: "id", widget: "string", hint: "Example: priy-ranjan" }
              - { label: "Full Name (Hindi)", name: "name", widget: "string" }
              - { label: "Role / Designation", name: "role", widget: "string", default: "Content Writer" }
              - { label: "Bio / About", name: "bio", widget: "text" }
              - { label: "Profile Photo", name: "image", widget: "image" }
              - { label: "X (Twitter) Link", name: "x_link", widget: "string", required: false }
              - { label: "LinkedIn Link", name: "linkedin_link", widget: "string", required: false }
              - { label: "GitHub Link", name: "github_link", widget: "string", required: false }
              - { label: "Email Address", name: "email", widget: "string", required: false }

  - name: "global_settings"
    label: "⚙️ Global Settings"
    files:
      - name: "navigation"
        label: "🗺️ Navigation Menu"
        file: "content/nav.json"
        fields:
          - label: "Menu Items"
            name: "items"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - { label: "Label (with Emoji)", name: "label", widget: "string" }
              - { label: "Link (e.g. tech.html)", name: "link", widget: "string" }

      - name: "site_config"
        label: "🌐 Site Configuration"
        file: "content/settings.json"
        fields:
          - { label: "Site Name", name: "site_name", widget: "string" }
          - { label: "Tagline (Hindi)", name: "tagline", widget: "string" }
          - { label: "Logo Text", name: "logo_text", widget: "string" }
          - { label: "Footer Copyright", name: "footer_copy", widget: "string" }
          - label: "Social Links"
            name: "social"
            widget: "object"
            fields:
              - { label: "X (Twitter)", name: "x_link", widget: "string", required: false }
              - { label: "LinkedIn", name: "linkedin_link", widget: "string", required: false }
              - { label: "GitHub", name: "github_link", widget: "string", required: false }
          - label: "Payments (UPI/Razorpay)"
            name: "payments"
            widget: "object"
            fields:
              - { label: "UPI ID", name: "upi_id", widget: "string" }
              - { label: "UPI QR Code Image", name: "upi_qr", widget: "image" }
              - { label: "Razorpay / External Link", name: "pay_link", widget: "string", required: false }

  - name: "topic_queue"
    label: "🤖 Srijan Topic Queue"
    delete: false
    files:
      - name: "queue"
        label: "Manage Suggestions"
        file: "content/suggestions.json"
        fields:
          - label: "Suggested Topics"
            name: "suggestions"
            widget: "list"
            summary: "{{fields.topic}} [{{fields.category}}] ({{fields.status}})"
            fields:
              - { label: "Category", name: "category", widget: "select", options: ["तकनीक", "विज्ञान", "अंतरिक्ष", "पर्यावरण", "स्वास्थ्य", "सृजन रोबॉटिक्स"] }
              - { label: "Topic / Title Hint (English or Hindi)", name: "topic", widget: "string" }
              - { label: "Additional Notes / Outline", name: "notes", widget: "text", required: false }
              - { label: "Status", name: "status", widget: "select", options: ["Pending", "Completed", "Cancelled"], default: "Pending" }
              - { label: "Created At", name: "created_at", widget: "datetime", default: "" }
