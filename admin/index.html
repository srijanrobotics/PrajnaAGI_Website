<!DOCTYPE html>
<html lang="hi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PrajnaAGI — Content Management System</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" content="#050508" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap');

      /* ── PrajnaAGI CMS Skin: Space Amber Dashboard ── */
      :root {
        --pj-gold: #ffaa00;
        --pj-gold-dim: rgba(255, 170, 0, 0.12);
        --pj-bg: #050508;
      }
      
      html, body {
        background: var(--pj-bg) !important;
        font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
      }

      /* Premium Static Space Background in CSS */
      body {
        background-image: 
          radial-gradient(circle at 50% 50%, #0c0d19 0%, #050508 100%),
          radial-gradient(rgba(255, 170, 0, 0.05) 1.5px, transparent 0) !important;
        background-size: 100% 100%, 28px 28px !important;
        background-attachment: fixed !important;
      }

      #nc-root { position: relative; z-index: 1; }

      /* Top Bar — Glassmorphic Neural Strip */
      [class*="AppHeader"] {
        background: rgba(8, 8, 12, 0.8) !important;
        border-bottom: 1px solid var(--pj-gold-dim) !important;
        -webkit-backdrop-filter: blur(16px) saturate(1.3);
        backdrop-filter: blur(16px) saturate(1.3);
        font-family: 'Outfit', sans-serif !important;
      }
      [class*="AppHeader"] a, [class*="AppHeader"] button, [class*="AppHeader"] span {
        color: #e2e2e2 !important;
        font-weight: 500 !important;
      }
      [class*="AppHeader"] a[class*="active"], [class*="AppHeader"] a:hover {
        color: var(--pj-gold) !important;
        text-shadow: 0 0 10px rgba(255, 170, 0, 0.4);
      }

      /* Sidebar Navigation — Glass Card */
      [class*="SidebarContainer"] {
        background: rgba(12, 12, 18, 0.8) !important;
        border: 1px solid var(--pj-gold-dim) !important;
        border-radius: 16px !important;
        -webkit-backdrop-filter: blur(12px);
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5) !important;
      }
      [class*="SidebarNavLink"] {
        color: #b0b0b8 !important;
        border-radius: 12px !important;
        margin: 4px 10px !important;
        padding: 10px 14px !important;
        font-family: 'Outfit', sans-serif !important;
        font-weight: 500 !important;
        transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
      }
      [class*="SidebarNavLink"]:hover {
        background: var(--pj-gold-dim) !important;
        color: var(--pj-gold) !important;
        transform: translateX(3px);
      }
      [class*="SidebarNavLink"][class*="active"] {
        background: var(--pj-gold-dim) !important;
        color: var(--pj-gold) !important;
        border-left: 3px solid var(--pj-gold) !important;
      }

      /* Cards Grid & Lists — Glowing space cards */
      [class*="ListCardLink"], [class*="GridCardLink"] {
        background: rgba(16, 16, 24, 0.8) !important;
        border: 1px solid var(--pj-gold-dim) !important;
        border-radius: 14px !important;
        color: #e2e2e8 !important;
        box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.3) !important;
        transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      }
      [class*="ListCardLink"]:hover, [class*="GridCardLink"]:hover {
        border-color: rgba(255, 170, 0, 0.45) !important;
        transform: translateY(-3px);
        box-shadow: 0 10px 24px -12px rgba(255, 170, 0, 0.35) !important;
      }

      /* ── EDITOR PANELS & CONTROL WIDGETS ── */
      [class*="ControlPaneContainer"], [class*="EditorContainer"],
      [class*="PreviewPaneContainer"], [class*="EditorControlBar"] {
        max-width: 100% !important;
        background: transparent !important;
      }
      
      /* Form container backgrounds */
      [class*="ControlPaneContainer"] [class*="control-"],
      [class*="card-"], [class*="Card"], [class*="ObjectControl"],
      [class*="ListControl"], [class*="NestedObject"], [class*="widget-"],
      [class*="Widget"], fieldset {
        background: rgba(14, 14, 22, 0.6) !important;
        border: 1px solid var(--pj-gold-dim) !important;
        border-radius: 14px !important;
        -webkit-backdrop-filter: blur(16px);
        backdrop-filter: blur(16px);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2) !important;
        margin-bottom: var(--s4) !important;
      }

      /* Heading typography inside fields */
      [class*="ControlPaneContainer"] h1,
      [class*="ControlPaneContainer"] h2,
      [class*="ControlPaneContainer"] h3,
      [class*="FieldLabel"], [class*="Label"] {
        font-family: 'Outfit', sans-serif !important;
        color: #f4f4f6 !important;
        font-weight: 600 !important;
        letter-spacing: 0.5px !important;
      }

      /* Inputs & Textareas — Smooth Focus Rings */
      input, textarea, select,
      [class*="control-"] input, [class*="control-"] textarea,
      [contenteditable="true"], [class*="CommonEditorComponentStyles"] {
        background: rgba(8, 8, 12, 0.8) !important;
        color: #ffffff !important;
        border: 1px solid rgba(255, 170, 0, 0.15) !important;
        border-radius: 10px !important;
        padding: 12px 14px !important;
        font-family: 'Inter', sans-serif !important;
        transition: border-color 0.25s ease, box-shadow 0.25s ease;
      }
      input:focus, textarea:focus, select:focus,
      [class*="control-"] input:focus, [class*="control-"] textarea:focus {
        border-color: var(--pj-gold) !important;
        box-shadow: 0 0 10px rgba(255, 170, 0, 0.3) !important;
        outline: none !important;
      }
      input::placeholder, textarea::placeholder { color: #888892 !important; }

      /* Markdown editor controls styling */
      [class*="Toolbar"] {
        background: rgba(10, 10, 16, 0.9) !important;
        border-bottom: 1px solid var(--pj-gold-dim) !important;
        border-top-left-radius: 10px !important;
        border-top-right-radius: 10px !important;
      }
      [class*="Toolbar"] button, [class*="Toolbar"] svg {
        color: #d1d1d6 !important;
        fill: #d1d1d6 !important;
      }
      [class*="Toolbar"] button:hover {
        background: var(--pj-gold-dim) !important;
        color: var(--pj-gold) !important;
      }

      /* Live Preview Window styling */
      [class*="PreviewPaneContainer"] {
        border-left: 1px solid var(--pj-gold-dim) !important;
        background: rgba(5, 5, 8, 0.9) !important;
      }
      [class*="PreviewPaneContainer"] * { color: #eaeaea !important; }

      /* Collection listing view grid */
      [class*="CollectionTop"], [class*="CollectionHeader"],
      [class*="CardsGrid"] > *, [class*="ListCard"], [class*="EntryListing"],
      [class*="card"], main > div > div {
        background: rgba(14, 14, 22, 0.65) !important;
        border: 1px solid var(--pj-gold-dim) !important;
        border-radius: 14px !important;
      }
      [class*="CollectionTop"] *, [class*="ListCard"] *,
      [class*="CardsGrid"] *, [class*="EntryListing"] * {
        color: #e2e2e8 !important;
      }
      [class*="CollectionSearch"] input, [class*="SearchInput"] input {
        background: rgba(6, 6, 10, 0.8) !important;
        border-radius: 10px !important;
        border: 1px solid rgba(255, 170, 0, 0.15) !important;
      }

      /* Scrollbars */
      ::-webkit-scrollbar { width: 10px; height: 10px; background: #08080c; }
      ::-webkit-scrollbar-thumb { background: rgba(255, 170, 0, 0.25); border-radius: 5px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255, 170, 0, 0.4); }

      /* Custom floating quick actions toolbar */
      .pj-toolbar {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 2147483000;
        display: flex;
        gap: 12px;
      }
      .pj-toolbar a, .pj-toolbar button {
        font-family: 'Outfit', sans-serif !important;
        font-weight: 700 !important;
        font-size: 13px !important;
        color: #050508 !important;
        background: var(--pj-gold) !important;
        border: 0 !important;
        border-radius: 30px !important;
        padding: 12px 20px !important;
        cursor: pointer !important;
        text-decoration: none !important;
        box-shadow: 0 6px 20px rgba(255, 170, 0, 0.45) !important;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .pj-toolbar a:hover, .pj-toolbar button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 24px rgba(255, 170, 0, 0.6) !important;
      }

      @media (max-width: 640px) {
        .pj-toolbar { right: 12px; bottom: 12px; }
        .pj-toolbar a, .pj-toolbar button { padding: 10px 16px !important; font-size: 12px !important; }
        [class*="SidebarContainer"] { border-radius: 12px !important; }
        input, textarea, select { font-size: 16px !important; }
      }
    </style>
  </head>
  <body>
    <!-- Quick Toolbar -->
    <div class="pj-toolbar" aria-label="quick actions">
      <a href="/" target="_blank" rel="noopener">🌐 साइट देखें</a>
      <button type="button" id="pjProfileBtn">👤 प्रोफ़ाइल</button>
    </div>

    <!-- Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // ── Profile/Account netlify identity handler ──
      document.getElementById('pjProfileBtn').addEventListener('click', function () {
        if (window.netlifyIdentity) window.netlifyIdentity.open();
      });

      // ── Custom Rich Text Editor Components ──
      CMS.registerEditorComponent({
        id: "youtube",
        label: "YouTube",
        fields: [{ name: "id", label: "YouTube Video ID", widget: "string" }],
        pattern: /^youtube (\S+)$/,
        fromBlock: function (match) { return { id: match[1] }; },
        toBlock: function (obj) { return "`youtube:" + obj.id + "`"; },
        toPreview: function (obj) {
          return '<img src="https://img.youtube.com/vi/' + obj.id + '/0.jpg" alt="YouTube Video"/>';
        }
      });
      CMS.registerEditorComponent({
        id: "twitter",
        label: "X (Twitter)",
        fields: [{ name: "url", label: "Post URL", widget: "string" }],
        pattern: /^twitter (\S+)$/,
        fromBlock: function (match) { return { url: match[1] }; },
        toBlock: function (obj) { return "`twitter:" + obj.url + "`"; },
        toPreview: function (obj) { return "<blockquote>X Post: " + obj.url + "</blockquote>"; }
      });

      // Embed main styles for live previews
      CMS.registerPreviewStyle("/assets/css/main.css");
      CMS.registerPreviewStyle("/assets/css/advanced.css");
    </script>
  </body>
</html>
