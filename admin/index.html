<!DOCTYPE html>
<html lang="hi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PrajnaAGI — Content Management System</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" content="#0a0a0f" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      /* ── PrajnaAGI CMS skin v2: cosmos + amaltas gold + neural glass ── */
      :root { --pj-gold: #FFD700; --pj-gold-dim: rgba(255, 215, 0, 0.14); --pj-bg: #0a0a0f; }
      html, body { background: var(--pj-bg) !important; }

      /* neural network background (behind everything, non-interactive) */
      #neuralBg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        opacity: 0.5;
      }
      #nc-root { position: relative; z-index: 1; }

      /* top bar — liquid glass */
      [class*="AppHeader"] {
        background: rgba(10, 10, 15, 0.72) !important;
        border-bottom: 1px solid var(--pj-gold-dim) !important;
        -webkit-backdrop-filter: blur(14px) saturate(1.3);
        backdrop-filter: blur(14px) saturate(1.3);
      }
      [class*="AppHeader"] a, [class*="AppHeader"] button, [class*="AppHeader"] span { color: #e8e8e8 !important; }
      [class*="AppHeader"] a[class*="active"], [class*="AppHeader"] a:hover { color: var(--pj-gold) !important; }

      /* sidebar — glass card */
      [class*="SidebarContainer"] {
        background: rgba(16, 16, 24, 0.8) !important;
        border: 1px solid var(--pj-gold-dim) !important;
        border-radius: 14px !important;
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
      }
      [class*="SidebarNavLink"] {
        color: #bbb !important;
        border-radius: 10px !important;
        margin: 3px 8px !important;
        transition: background 0.2s ease, color 0.2s ease;
      }
      [class*="SidebarNavLink"]:hover,
      [class*="SidebarNavLink"][class*="active"] {
        background: var(--pj-gold-dim) !important;
        color: var(--pj-gold) !important;
      }

      /* content cards — glass */
      [class*="ListCardLink"], [class*="GridCardLink"] {
        background: rgba(20, 20, 29, 0.82) !important;
        border: 1px solid var(--pj-gold-dim) !important;
        border-radius: 12px !important;
        color: #e8e8e8 !important;
        transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      }
      [class*="ListCardLink"]:hover, [class*="GridCardLink"]:hover {
        border-color: rgba(255, 215, 0, 0.5) !important;
        transform: translateY(-2px);
        box-shadow: 0 12px 30px -18px rgba(255, 215, 0, 0.35);
      }

      /* ── EDITOR: full liquid-glass, readable light text everywhere ── */
      [class*="ControlPaneContainer"], [class*="EditorContainer"],
      [class*="PreviewPaneContainer"], [class*="EditorControlBar"] {
        max-width: 100% !important;
        background: transparent !important;
      }
      /* every card / control / widget wrapper -> glass */
      [class*="ControlPaneContainer"] [class*="control-"],
      [class*="card-"], [class*="Card"], [class*="ObjectControl"],
      [class*="ListControl"], [class*="NestedObject"], [class*="widget-"],
      [class*="Widget"], fieldset {
        background: rgba(20, 20, 29, 0.55) !important;
        border: 1px solid var(--pj-gold-dim) !important;
        border-radius: 12px !important;
        -webkit-backdrop-filter: blur(12px) saturate(1.2);
        backdrop-filter: blur(12px) saturate(1.2);
      }
      /* labels + all text light */
      [class*="ControlPaneContainer"] label,
      [class*="ControlPaneContainer"] p,
      [class*="ControlPaneContainer"] span,
      [class*="ControlPaneContainer"] h1,
      [class*="ControlPaneContainer"] h2,
      [class*="ControlPaneContainer"] h3,
      [class*="FieldLabel"], [class*="Label"] {
        color: #eaeaea !important;
      }
      /* inputs / textareas / selects -> readable glass */
      input, textarea, select,
      [class*="control-"] input, [class*="control-"] textarea,
      [contenteditable="true"], [class*="CommonEditorComponentStyles"] {
        background: rgba(10, 10, 15, 0.55) !important;
        color: #f4f4f4 !important;
        border: 1px solid var(--pj-gold-dim) !important;
        border-radius: 8px !important;
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
      }
      input::placeholder, textarea::placeholder { color: #9a9a9a !important; }
      /* markdown editor + its toolbar */
      [class*="Toolbar"] { background: rgba(16,16,24,0.6) !important; }
      [class*="Toolbar"] button, [class*="Toolbar"] svg { color: #eaeaea !important; fill: #eaeaea !important; }
      /* preview pane text */
      [class*="PreviewPaneContainer"] * { color: #eaeaea; }

      /* ── COLLECTION LIST VIEW: glass cards + readable light text ── */
      /* any white/!light panel -> dark glass */
      [class*="CollectionTop"], [class*="CollectionHeader"],
      [class*="CardsGrid"] > *, [class*="ListCard"], [class*="EntryListing"],
      [class*="card"], main > div > div {
        background: rgba(20, 20, 29, 0.6) !important;
        -webkit-backdrop-filter: blur(12px) saturate(1.2);
        backdrop-filter: blur(12px) saturate(1.2);
        border: 1px solid var(--pj-gold-dim) !important;
        border-radius: 12px !important;
      }
      /* force ALL text in the app to a readable light tone (except gold accents) */
      [class*="CollectionTop"], [class*="CollectionTop"] *,
      [class*="ListCard"], [class*="ListCard"] *,
      [class*="CardsGrid"] *, [class*="EntryListing"] *,
      [class*="CollectionPage"] h1, [class*="CollectionPage"] h2,
      [class*="CollectionPage"] p, [class*="CollectionPage"] span,
      [class*="CollectionPage"] a {
        color: #f0f0f0 !important;
      }
      /* keep active nav + accents gold */
      [class*="SidebarNavLink"][class*="active"], [class*="SidebarNavLink"]:hover { color: var(--pj-gold) !important; }
      /* search box readable */
      [class*="CollectionSearch"] input, [class*="SearchInput"] input {
        background: rgba(10,10,15,0.55) !important;
        color: #f4f4f4 !important;
      }

      /* scrollbar */
      ::-webkit-scrollbar { width: 10px; height: 10px; background: #101018; }
      ::-webkit-scrollbar-thumb { background: rgba(255, 215, 0, 0.28); border-radius: 5px; }

      /* quick toolbar (bottom-right): site + profile */
      .pj-toolbar {
        position: fixed;
        right: 14px;
        bottom: 14px;
        z-index: 2147483000;
        display: flex;
        gap: 10px;
      }
      .pj-toolbar a, .pj-toolbar button {
        font: 700 13px/1 system-ui, sans-serif;
        color: #111;
        background: var(--pj-gold);
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 8px 24px -10px rgba(255, 215, 0, 0.7);
        transition: transform 0.15s ease;
      }
      .pj-toolbar a:hover, .pj-toolbar button:hover { transform: translateY(-2px); }

      /* phone smoothness */
      @media (max-width: 640px) {
        .pj-toolbar { right: 10px; bottom: 10px; }
        .pj-toolbar a, .pj-toolbar button { padding: 11px 14px; font-size: 12px; }
        [class*="SidebarContainer"] { border-radius: 10px !important; }
        input, textarea, select { font-size: 16px !important; } /* stops iOS zoom-jump */
      }
      @media (prefers-reduced-motion: reduce) { #neuralBg { display: none; } }
    </style>
  </head>
  <body>
    <canvas id="neuralBg" aria-hidden="true"></canvas>

    <!-- quick toolbar -->
    <div class="pj-toolbar" aria-label="quick actions">
      <a href="/" target="_blank" rel="noopener">🌐 साइट देखें</a>
      <button type="button" id="pjProfileBtn">👤 प्रोफ़ाइल</button>
    </div>

    <!-- Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // ── profile / account (Netlify Identity modal: user, logout) ──
      document.getElementById('pjProfileBtn').addEventListener('click', function () {
        if (window.netlifyIdentity) window.netlifyIdentity.open();
      });

      // ── custom editor components ──
      CMS.registerEditorComponent({
        id: "youtube",
        label: "YouTube",
        fields: [{ name: "id", label: "YouTube Video ID", widget: "string" }],
        pattern: /^youtube (\S+)$/,
        fromBlock: function (match) { return { id: match[1] }; },
        toBlock: function (obj) { return "`youtube:" + obj.id + "`"; },
        toPreview: function (obj) {
          return '<img src="https://img.youtube.com/vi/' + obj.id + '/0.jpg" alt="YouTube Video"/>';
        }
      });
      CMS.registerEditorComponent({
        id: "twitter",
        label: "X (Twitter)",
        fields: [{ name: "url", label: "Post URL", widget: "string" }],
        pattern: /^twitter (\S+)$/,
        fromBlock: function (match) { return { url: match[1] }; },
        toBlock: function (obj) { return "`twitter:" + obj.url + "`"; },
        toPreview: function (obj) { return "<blockquote>X Post: " + obj.url + "</blockquote>"; }
      });

      // live preview uses the real site's CSS
      CMS.registerPreviewStyle("/assets/css/main.css");
      CMS.registerPreviewStyle("/assets/css/advanced.css");

      // ── neural-network background (brainish, subtle, gold) ──
      (function () {
        const canvas = document.getElementById('neuralBg');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let W, H, nodes;
        const isPhone = Math.min(screen.width, screen.height) < 640;
        const COUNT = isPhone ? 26 : 54;

        function resize() {
          W = canvas.width = innerWidth;
          H = canvas.height = innerHeight;
        }
        addEventListener('resize', resize);
        resize();

        nodes = Array.from({ length: COUNT }, function () {
          return {
            x: Math.random() * W, y: Math.random() * H,
            vx: (Math.random() - 0.5) * 0.25,
            vy: (Math.random() - 0.5) * 0.25,
            r: 1 + Math.random() * 1.8
          };
        });

        function draw() {
          ctx.clearRect(0, 0, W, H);
          for (let i = 0; i < nodes.length; i++) {
            const a = nodes[i];
            a.x += a.vx; a.y += a.vy;
            if (a.x < 0 || a.x > W) a.vx *= -1;
            if (a.y < 0 || a.y > H) a.vy *= -1;
            for (let j = i + 1; j < nodes.length; j++) {
              const b = nodes[j];
              const dx = a.x - b.x, dy = a.y - b.y;
              const d2 = dx * dx + dy * dy;
              if (d2 < 150 * 150) {
                const t = 1 - Math.sqrt(d2) / 150;
                ctx.strokeStyle = 'rgba(255,215,0,' + (0.10 * t).toFixed(3) + ')';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
              }
            }
            ctx.fillStyle = 'rgba(255,215,0,0.35)';
            ctx.beginPath(); ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2); ctx.fill();
          }
          requestAnimationFrame(draw);
        }
        requestAnimationFrame(draw);
      })();
    </script>
  </body>
</html>
