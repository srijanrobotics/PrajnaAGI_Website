<!DOCTYPE html>
<html lang="hi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PrajnaAGI — Content Management System</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap');

      /* Custom Font overrides for default Decap CMS elements */
      html, body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif !important;
      }
      
      /* Make sure the toolbar matches the premium light theme */
      .pj-toolbar {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 2147483000;
        display: flex;
        gap: 12px;
      }
      .pj-toolbar a, .pj-toolbar button {
        font-family: 'Outfit', sans-serif !important;
        font-weight: 700 !important;
        font-size: 13px !important;
        color: #ffffff !important;
        background: #111111 !important;
        border: 0 !important;
        border-radius: 30px !important;
        padding: 12px 20px !important;
        cursor: pointer !important;
        text-decoration: none !important;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15) !important;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .pj-toolbar a:hover, .pj-toolbar button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25) !important;
      }

      @media (max-width: 640px) {
        .pj-toolbar { right: 12px; bottom: 12px; }
        .pj-toolbar a, .pj-toolbar button { padding: 10px 16px !important; font-size: 12px !important; }
      }
    </style>
  </head>
  <body>
    <!-- Quick Toolbar -->
    <div class="pj-toolbar" aria-label="quick actions">
      <a href="/" target="_blank" rel="noopener">🌐 साइट देखें</a>
      <button type="button" id="pjProfileBtn">👤 प्रोफ़ाइल</button>
    </div>

    <!-- Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // ── Profile/Account netlify identity handler ──
      document.getElementById('pjProfileBtn').addEventListener('click', function () {
        if (window.netlifyIdentity) window.netlifyIdentity.open();
      });

      // ── Custom Rich Text Editor Components ──
      CMS.registerEditorComponent({
        id: "youtube",
        label: "YouTube",
        fields: [{ name: "id", label: "YouTube Video ID", widget: "string" }],
        pattern: /^youtube (\S+)$/,
        fromBlock: function (match) { return { id: match[1] }; },
        toBlock: function (obj) { return "`youtube:" + obj.id + "`"; },
        toPreview: function (obj) {
          return '<img src="https://img.youtube.com/vi/' + obj.id + '/0.jpg" alt="YouTube Video"/>';
        }
      });
      CMS.registerEditorComponent({
        id: "twitter",
        label: "X (Twitter)",
        fields: [{ name: "url", label: "Post URL", widget: "string" }],
        pattern: /^twitter (\S+)$/,
        fromBlock: function (match) { return { url: match[1] }; },
        toBlock: function (obj) { return "`twitter:" + obj.url + "`"; },
        toPreview: function (obj) { return "<blockquote>X Post: " + obj.url + "</blockquote>"; }
      });

      // Embed main styles for live previews
      CMS.registerPreviewStyle("/assets/css/main.css");
      CMS.registerPreviewStyle("/assets/css/advanced.css");
    </script>
  </body>
</html>
