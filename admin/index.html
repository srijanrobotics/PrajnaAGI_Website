<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRAJNA ARTIFICIAL GENERAL INTELLIGENCE — Content Management System</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      /* Custom Styling for the CMS Dashboard */
      .nc-app-header-fixed { background: #000 !important; border-bottom: 1px solid #333 !important; }
      .nc-app-header-title { color: #00f2fe !important; font-weight: 900 !important; letter-spacing: 1px; }
      .nc-collectionPage-sidebar { background: #0a0a0a !important; border-right: 1px solid #222 !important; }
      .nc-collectionPage-sidebar-link { color: #aaa !important; border-radius: 8px !important; margin: 4px 8px !important; }
      .nc-collectionPage-sidebar-link-active { background: rgba(0, 242, 254, 0.1) !important; color: #00f2fe !important; }
    </style>
  </head>
  <body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // Register custom editor components
      CMS.registerEditorComponent({
        id: "youtube",
        label: "YouTube",
        fields: [{name: 'id', label: 'YouTube Video ID', widget: 'string'}],
        pattern: /^youtube (\S+)$/,
        fromBlock: function(match) { return { id: match[1] }; },
        toBlock: function(obj) { return '`youtube:' + obj.id + '`'; },
        toPreview: function(obj) {
          return '<img src="http://img.youtube.com/vi/' + obj.id + '/0.jpg" alt="Youtube Video"/>';
        }
      });
      
      CMS.registerEditorComponent({
        id: "twitter",
        label: "X (Twitter)",
        fields: [{name: 'url', label: 'Post URL', widget: 'string'}],
        pattern: /^twitter (\S+)$/,
        fromBlock: function(match) { return { url: match[1] }; },
        toBlock: function(obj) { return '`twitter:' + obj.url + '`'; },
        toPreview: function(obj) {
          return '<blockquote>X Post: ' + obj.url + '</blockquote>';
        }
      });
    </script>
  </body>
</html>
