[[edge_functions]]
path = "/article*"
function = "inject-metadata"

# ── SECURITY HEADERS ──────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://identity.netlify.com https://unpkg.com 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' https://image.pollinations.ai https://api.qrserver.com https://*.githubusercontent.com https://images.unsplash.com data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://identity.netlify.com https://*.netlify.com https://api.github.com; frame-src https://identity.netlify.com https://www.youtube.com https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Cross-Origin-Opener-Policy = "same-origin"

# Fonts rarely change — safe to cache long
[[headers]]
  for = "/assets/*.ttf"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# JS/CSS: always revalidate so code updates show immediately (304 if unchanged)
[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Content JSON must always be fresh (articles/facts/ticker)
[[headers]]
  for = "/content/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

