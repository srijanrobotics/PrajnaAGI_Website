<!DOCTYPE html>
<html lang="hi">
<head>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सफलतापूर्वक सब्सक्राइब हुआ — PrajnaAGI</title>
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Noto+Sans+Devanagari:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        #spaceCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }
        .success-box {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .success-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 3rem 2rem;
            border-radius: 30px;
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.8s ease;
        }
        .success-card h1 {
            font-family: 'Tiro Devanagari Hindi', serif;
            color: var(--accent);
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .success-card p {
            color: var(--text-main);
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .btn-home {
            display: inline-block;
            background: var(--accent);
            color: #000;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 800;
            transition: var(--transition);
        }
        .btn-home:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body data-theme="dark">
    <canvas id="spaceCanvas"></canvas>
    
    <div class="success-box">
        <div class="success-card">
            <div style="font-size: 4rem; margin-bottom: 1rem;">🚀</div>
            <h1>सफलतापूर्वक जुड़े!</h1>
            <p>धन्यवाद! आप प्रज्ञाAGI परिवार का हिस्सा बन गए हैं। अब ब्रह्मांड की हर बड़ी खबर सीधे आपके इनबॉक्स में पहुंचेगी।</p>
            <a href="Index.html" class="btn-home">मुख्य पृष्ठ पर लौटें</a>
        </div>
    </div>

    <script src="assets/js/canvas.js"></script>
    <script src="assets/js/ui.js"></script>
</body>
</html>
