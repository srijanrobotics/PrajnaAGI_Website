name: Prajna Auto Publish

on:
  schedule:
    # 7:00 IST = 01:30 UTC (morning) · 17:00 IST = 11:30 UTC (evening)
    - cron: "30 1 * * *"
    - cron: "30 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install google-generativeai

      - name: Generate articles
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RUN_SLOT: ${{ github.event.schedule == '30 1 * * *' && 'morning' || 'evening' }}
        run: python scripts/auto_publish.py

      - name: Commit & push
        run: |
          git config user.name "Prajna (Srijan Robotics)"
          git config user.email "srijanrobotics@gmail.com"
          git add content/articles.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "🤖 Prajna auto-publish: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
