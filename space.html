<!DOCTYPE html>
<html lang="hi">

<head>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अंतरिक्ष — PrajnaAGI</title>
    <!-- Open Graph / WhatsApp -->
    <meta property="og:title" content="अंतरिक्ष — PrajnaAGI">
    <meta property="og:description" content="ब्रह्मांड की गहराइयों की यात्रा — PrajnaAGI">
    <meta property="og:image" content="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=1200&h=630">
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Noto+Sans+Devanagari:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/advanced.css">
    <style>
        /* ── PAGE SPECIFIC ── */
        #spaceCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
        .category-hero { height: 60vh; background: url('assets/img/space-bg.jpg') center/cover; position: relative; display: flex; align-items: center; justify-content: center; text-align: center; margin-bottom: 4rem; border-bottom: 1px solid var(--accent); }
    </style>
    
</head>

<body data-theme="dark">
    <canvas id="spaceCanvas"></canvas>

    <!-- ── NAVIGATION ── -->
    <nav>
        <div class="nav-inner">
            <div class="brand-container">
                <canvas id="headerBlackHole"></canvas>
                <a href="index.html" class="logo"><span>PrajnaAGI</span></a>
                <ul class="menu-tabs">
                    <!-- Loaded via CMS -->
                </ul>
            </div>
            <div class="nav-controls">
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="खोजें...">
                    <button type="button" class="search-btn" aria-label="खोजें">🔍</button>
                </div>
                <button type="button" id="theme-toggle">☀️ दिन</button>
                <button type="button" class="hamburger" id="hamburger" aria-label="मेनू खोलें">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- ── MOBILE DROPDOWN ── -->
    <div class="mobile-menu" id="mobileMenu">
        <ul>
            <!-- Loaded via CMS -->
        </ul>
    </div>

    <div class="snap-container" id="cms-space-snap">
        <section class="space-section">
            <h2>ब्रह्मांड की गहराइयां</h2>
            <p>लोड हो रहा है...</p>
        </section>
    </div>

    <script src="assets/js/canvas.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/cms-loader.js"></script>
    <script>
        // Custom snap loader override
        async function loadSpaceSnap() {
            const data = await fetchJSON('content/articles.json');
            if (!data || !data.articles) return;
            const filtered = data.articles.filter(a => a.category === 'अंतरिक्ष');
            const container = document.getElementById('cms-space-snap');
            if (!container || !filtered.length) return;

            container.innerHTML = filtered.map(a => `
                <section class="space-section" style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('${a.image}') center/cover;">
                    <span class="tag">${a.tag || 'अंतरिक्ष'}</span>
                    <h2>${a.title}</h2>
                    <p>${a.summary}</p>
                    <a href="${a.url || '#'}" class="subscribe-btn" style="margin-top:2rem; text-decoration:none;">विस्तार से पढ़ें</a>
                </section>
            `).join('');
        }
        document.addEventListener('DOMContentLoaded', loadSpaceSnap);
    </script>
</body>

</html>
