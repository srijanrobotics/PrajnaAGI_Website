<html lang="hi">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>अंतरिक्ष — PrajnaAGI</title>
    <!-- Open Graph / WhatsApp -->
    <meta property="og:title" content="अंतरिक्ष — PrajnaAGI">
    <meta property="og:description" content="ब्रह्मांड की गहराइयों की यात्रा — PrajnaAGI">
    <meta property="og:image" content="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=1000">
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Noto+Sans+Devanagari:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        body { overflow: hidden; background: #000; }
        .snap-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        .space-section { height: 100vh; scroll-snap-align: start; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .space-section h2 { font-size: clamp(2rem, 5vw, 4rem); color: var(--accent); margin-bottom: 1.5rem; text-shadow: 0 0 30px var(--accent-glow); }
        .space-section p { max-width: 800px; font-size: 1.2rem; color: #ccc; line-height: 1.6; }
        
        #spaceCanvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; width: 100%; height: 100%; }

        nav { background: rgba(0,0,0,0.8); }
    </style>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body data-theme="dark">
    <canvas id="spaceCanvas"></canvas>

    <!-- ── NAVIGATION ── -->
    <nav>
        <div class="nav-inner">
            <div class="brand-container">
                <canvas id="headerBlackHole"></canvas>
                <a href="index.html" class="logo"><span>PrajnaAGI</span></a>
                <ul class="menu-tabs">
                    <li><a href="space.html" class="active">🌌 अंतरिक्ष</a></li>
                    <li><a href="science.html">🔬 विज्ञान</a></li>
                    <li><a href="tech.html">💻 तकनीक</a></li>
                    <li><a href="environment.html">🌿 पर्यावरण</a></li>
                    <li><a href="health.html">❤️ स्वास्थ्य</a></li>
                    <li><a href="about.html">🙏 हमारे बारे में</a></li>
                </ul>
            </div>
            <div class="nav-controls">
                <button id="theme-toggle">☀️ दिन</button>
                <button class="subscribe-nav-btn">सब्सक्रिप्शन</button>
                <button class="hamburger" id="hamburger" aria-label="मेनू खोलें">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- ── MOBILE DROPDOWN ── -->
    <div class="mobile-menu" id="mobileMenu">
        <ul>
            <li><a href="space.html">🌌 अंतरिक्ष</a></li>
            <li><a href="science.html">🔬 विज्ञान</a></li>
            <li><a href="tech.html">💻 तकनीक</a></li>
            <li><a href="environment.html">🌿 पर्यावरण</a></li>
            <li><a href="health.html">❤️ स्वास्थ्य</a></li>
            <li><a href="about.html">🙏 हमारे बारे में</a></li>
        </ul>
    </div>

    <div class="snap-container" id="cms-space-snap">
        <section class="space-section">
            <h2>ब्रह्मांड की गहराइयां</h2>
            <p>लोड हो रहा है...</p>
        </section>
    </div>

    <script src="assets/js/canvas.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/cms-loader.js"></script>
    <script>
        // Custom snap loader override
        async function loadSpaceSnap() {
            const data = await fetchJSON('content/articles.json');
            if (!data || !data.articles) return;
            const filtered = data.articles.filter(a => a.category === 'अंतरिक्ष');
            const container = document.getElementById('cms-space-snap');
            if (!container || !filtered.length) return;

            container.innerHTML = filtered.map(a => `
                <section class="space-section" style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('${a.image}') center/cover;">
                    <span class="tag">${a.tag || 'अंतरिक्ष'}</span>
                    <h2>${a.title}</h2>
                    <p>${a.summary}</p>
                    <a href="${a.url || '#'}" class="subscribe-btn" style="margin-top:2rem; text-decoration:none;">विस्तार से पढ़ें</a>
                </section>
            `).join('');
        }
        document.addEventListener('DOMContentLoaded', loadSpaceSnap);
    </script>
</body>

</html>
