<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      .disk-outer {
        transform-origin: 32px 32px;
        animation: spin 4s linear infinite;
      }
      .disk-inner {
        transform-origin: 32px 32px;
        animation: spin 2.4s linear infinite reverse;
      }
      .flare {
        transform-origin: 32px 32px;
        animation: spin 6s linear infinite;
      }
      .glow-pulse {
        animation: pulse 2.5s ease-in-out infinite;
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%,100% { opacity: 0.35; r: 15px; }
        50%     { opacity: 0.85; r: 17px; }
      }
    </style>
    <radialGradient id="bhGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0005"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E1AD01" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E1AD01" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Black background -->
  <rect width="64" height="64" fill="#050008" rx="10"/>

  <!-- Outer accretion disk (tilted ellipse, spinning) -->
  <g class="disk-outer">
    <ellipse cx="32" cy="32" rx="29" ry="9"
             fill="none" stroke="#E1AD01" stroke-width="2"
             stroke-dasharray="12 6" opacity="0.55"/>
  </g>

  <!-- Mid accretion disk -->
  <g class="disk-inner">
    <ellipse cx="32" cy="32" rx="22" ry="7"
             fill="none" stroke="#FFD54F" stroke-width="2.5"
             stroke-dasharray="8 5" opacity="0.75"/>
  </g>

  <!-- Relativistic jet / bright flare arm -->
  <g class="flare">
    <ellipse cx="32" cy="32" rx="16" ry="3"
             fill="none" stroke="#FFF9C4" stroke-width="1.5"
             stroke-dasharray="4 12" opacity="0.9"/>
  </g>

  <!-- Photon sphere glow -->
  <circle class="glow-pulse" cx="32" cy="32" r="15"
          fill="none" stroke="#E1AD01" stroke-width="1.5" opacity="0.5"/>

  <!-- Event horizon (the actual black hole) -->
  <circle cx="32" cy="32" r="12" fill="url(#bhGrad)"/>

  <!-- Singularity bright core -->
  <circle cx="32" cy="32" r="2.5" fill="#FFF9C4" opacity="0.95"/>

  <!-- Subtle inner glow halo -->
  <circle cx="32" cy="32" r="12" fill="url(#glowGrad)" opacity="0.2"/>
</svg>
